<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0d0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pocket Click">
<link rel="manifest" href="manifest.json">
<title>Pocket Click</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --accent: #5f8dff;
  --accent-soft: rgba(95,141,255,.22);
  --band-color: #5f8dff;
  --band-soft: rgba(95,141,255,.15);
  --band-border: rgba(95,141,255,.4);
  --bg: #0b0d0e;
  --card: rgba(255,255,255,0.06);
  --card-border: rgba(255,255,255,0.11);
  --text: #e4e4e4;
  --muted: #aaa;
  --faint: #888;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overscroll-behavior: none; }

.app { display: flex; flex-direction: column; height: 100%; max-width: 480px; margin: 0 auto; position: relative; }

/* ── TOPBAR ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(var(--safe-top) + 13px) 20px 13px;
  border-bottom: 1px solid var(--card-border);
  flex-shrink: 0;
  background: rgba(11,13,14,0.92);
  backdrop-filter: blur(16px);
  position: relative; z-index: 10;
}
.topbar-left .brand { font-size: 10px; letter-spacing: .28em; text-transform: uppercase; color: var(--faint); }
.topbar-left .brand a { color: #888; text-decoration: none; transition: color .2s; }
.topbar-left .brand a:hover { color: #ccc; }
.topbar-left .app-name { font-size: 17px; font-weight: 700; color: #d0d0d0; margin-top: 2px; }
.tab-btns { display: flex; gap: 3px; background: rgba(255,255,255,.06); border-radius: 22px; padding: 3px; }
.tab-btn { padding: 6px 16px; border-radius: 18px; border: none; background: transparent; color: #aaa; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; font-family: inherit; }
.tab-btn.active { background: rgba(255,255,255,.14); color: #fff; }

/* ── PAGES ── */
/* Bottom padding accounts for player bar (80px) + safe area */
.page { display: none; flex: 1; overflow-y: auto; padding: 18px; padding-bottom: calc(var(--safe-bottom) + 20px); flex-direction: column; gap: 14px; }
.page.visible { display: flex; }

/* ── CARD ── */
.card { background: var(--card); border: 1px solid var(--card-border); border-radius: 20px; padding: 16px 18px; }

/* ── METRONOME ── */
.circle-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6px 0 8px;
  height: 210px; /* fixed height so absolute children have reference */
}
/* Small circles float left/right absolutely */
.side-circle {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  width: 80px; height: 80px; border-radius: 50%;
  border: 6px solid rgba(255,255,255,.1);
  background: radial-gradient(circle at 38% 33%, rgba(255,255,255,0.05), #0c0d0f 60%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; user-select: none;
  transition: border-color .3s, box-shadow .1s;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
.side-circle:hover { border-color: rgba(255,255,255,.2); }
.side-circle-label {
  font-size: 9px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: #888; text-align: center;
  transition: color .2s; line-height: 1.4; padding: 0 4px;
}
.side-circle:hover .side-circle-label { color: #bbb; }
/* tap circle is on the right */
.tap-circle { right: 12px; }
/* stage circle is on the left */
.stage-circle { left: 12px; }
.stage-circle:hover .side-circle-label { color: #ccc; }
.circle {
  width: 190px; height: 190px; border-radius: 50%;
  border: 10px solid rgba(255,255,255,.13);
  background: radial-gradient(circle at 38% 33%, rgba(255,255,255,0.07), #0c0d0f 58%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; user-select: none;
  transition: border-color .5s, box-shadow .1s;
  box-shadow: 0 18px 55px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.08);
}
.circle:hover { border-color: rgba(255,255,255,.22); }
.circle.flash {
  box-shadow: 0 0 0 2px var(--accent), 0 0 36px var(--accent), 0 0 72px var(--accent-soft), 0 18px 55px rgba(0,0,0,.5);
}
.bpm-num { font-size: 62px; font-weight: 700; line-height: 1; color: var(--accent); transition: color .5s; letter-spacing: 0; text-align: center; font-feature-settings: "tnum" 1; font-variant-numeric: tabular-nums; }
.bpm-lbl { font-size: 12px; letter-spacing: .3em; text-transform: uppercase; color: #666; margin-top: 5px; }
.circle-hint { font-size: 11px; letter-spacing: .15em; text-transform: uppercase; color: #555; margin-top: 9px; transition: color .3s; }
.circle:hover .circle-hint, .circle.on .circle-hint { color: #bbb; }

/* ── TAP TEMPO CIRCLE ── */
.tap-circle.tap-flash {
  box-shadow: 0 0 0 2px var(--accent), 0 0 24px var(--accent), 0 8px 24px rgba(0,0,0,.4);
  border-color: var(--accent);
}
.tap-label {
  font-size: 10px; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; color: #888; transition: color .2s; line-height: 1;
}
.tap-circle:hover .tap-label { color: #bbb; }
.tap-circle.tap-flash .tap-label { color: var(--accent); }
.tap-bpm {
  font-size: 17px; font-weight: 700; color: var(--accent);
  transition: color .5s; letter-spacing: 0; margin-top: 2px; min-height: 20px;
  font-feature-settings: "tnum"; font-variant-numeric: tabular-nums;
}
.tap-hint {
  font-size: 9px; letter-spacing: .12em; text-transform: uppercase;
  color: #555; margin-top: 3px; transition: color .2s;
}
.tap-circle:hover .tap-hint { color: #999; }

/* ── STAGE MODE OVERLAY ── */
.stage-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 100;
  background: #000;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
}
.stage-overlay.active { display: flex; }

/* Big circle in stage mode */
.stage-big-circle {
  width: 240px; height: 240px; border-radius: 50%;
  border: 10px solid rgba(255,255,255,.1);
  background: radial-gradient(circle at 38% 33%, rgba(255,255,255,0.06), #050505 58%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: border-color .5s, box-shadow .1s;
  box-shadow: 0 0 60px rgba(0,0,0,.8);
  cursor: pointer; user-select: none;
}
.stage-big-circle.flash {
  box-shadow: 0 0 0 3px var(--accent), 0 0 50px var(--accent), 0 0 100px var(--accent-soft);
}
.stage-bpm-num { font-size: 78px; font-weight: 700; color: var(--accent); transition: color .5s; letter-spacing: 0; line-height: 1; text-align: center; font-feature-settings: "tnum" 1; font-variant-numeric: tabular-nums; }
.stage-bpm-lbl { font-size: 12px; letter-spacing: .3em; text-transform: uppercase; color: #888; margin-top: 6px; }

/* Song nav bar in stage mode */
.stage-nav {
  display: flex; align-items: center; justify-content: center;
  gap: 18px; margin-top: 40px; width: 100%; padding: 0 24px;
}
.stage-nav-btn {
  width: 48px; height: 48px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.05);
  color: #999; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.stage-nav-btn:hover { border-color: rgba(255,255,255,.25); color: #ddd; background: rgba(255,255,255,.1); }
.stage-nav-btn:active { transform: scale(.92); }
.stage-nav-btn:disabled { opacity: .18; pointer-events: none; }
.stage-song-info { flex: 1; text-align: center; min-width: 0; }
.stage-song-name { font-size: 24px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 3px; }
.stage-band-name { font-size: 11px; letter-spacing: .22em; text-transform: uppercase; color: var(--band-color); transition: color .5s; font-weight: 600; }
.stage-song-bpm  { font-size: 15px; font-weight: 600; color: var(--accent); transition: color .5s; margin-top: 6px; }

/* Neighbors (prev/next song names) */
.stage-neighbors { margin-top: 24px; position: relative; display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 0 24px; gap: 12px; }
.stage-neighbor { font-size: 16px; font-weight: 600; color: #999; max-width: 36%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.5; }
.stage-neighbor.right { text-align: right; }
.stage-counter { font-size: 18px; font-weight: 700; color: #aaa; letter-spacing: .04em; text-align: center; font-feature-settings: "tnum"; font-variant-numeric: tabular-nums; position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none; }

/* Exit button top-right */
.stage-exit {
  position: absolute; top: calc(env(safe-area-inset-top, 0px) + 16px); right: 20px;
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06);
  color: #aaa; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.stage-exit:hover { background: rgba(255,255,255,.12); color: #ccc; }

/* BPM row */
.bpm-row { display: flex; align-items: center; gap: 10px; }
.pm-btn {
  flex-shrink: 0; width: 40px; height: 40px; border-radius: 12px;
  border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.07);
  color: #ccc; font-size: 22px; font-weight: 300; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .15s; user-select: none; font-family: inherit;
}
.pm-btn:hover { background: rgba(255,255,255,.14); color: #fff; }
.pm-btn:active { transform: scale(.91); }
input[type=range] { flex: 1; height: 4px; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,.12); border-radius: 2px; cursor: pointer; outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--accent); cursor: pointer; box-shadow: 0 0 10px var(--accent); transition: background .5s, box-shadow .5s; }
input[type=range]::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: var(--accent); cursor: pointer; border: none; box-shadow: 0 0 10px var(--accent); }
.bpm-val { min-width: 46px; text-align: right; font-size: 24px; font-weight: 700; color: var(--accent); transition: color .5s; }

/* Subdivisions */
.sub-row { display: flex; gap: 6px; }
.sub-btn { flex: 1; padding: 9px 4px; border-radius: 12px; border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.04); color: #777; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; text-align: center; font-family: inherit; }
.sub-btn[data-b="1"] { --sc: #5f8dff; --sc-soft: rgba(95,141,255,.18); }
.sub-btn[data-b="2"] { --sc: #f1b54f; --sc-soft: rgba(241,181,79,.18); }
.sub-btn[data-b="3"] { --sc: #ff865c; --sc-soft: rgba(255,134,92,.18); }
.sub-btn[data-b="4"] { --sc: #5dda9d; --sc-soft: rgba(93,218,157,.18); }
.sub-btn:hover       { background: rgba(255,255,255,.09); color: #bbb; }
.sub-btn.active      { background: var(--sc-soft); border-color: var(--sc); color: var(--sc); box-shadow: 0 0 14px var(--sc-soft), 0 0 0 1px var(--sc); }

/* Volume */
.vol-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07); border-radius: 13px; }
.vol-icon { color: #777; display: flex; align-items: center; }
.vol-lbl { font-size: 12px; color: #888; min-width: 34px; text-align: right; }

/* Play button */
.play-btn {
  width: 100%; padding: 17px; border-radius: 18px;
  border: 1px solid rgba(62,96,85,.55);
  background: linear-gradient(135deg, #3e6058, #2a4039);
  color: #c8eee4; font-size: 17px; font-weight: 700; letter-spacing: .08em;
  cursor: pointer; transition: all .2s; font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: 0 8px 28px rgba(50,150,120,.14);
}
.play-btn:hover { filter: brightness(1.18); box-shadow: 0 8px 28px rgba(50,150,120,.26); }
.play-btn:active { transform: scale(.98); }
.play-btn.on { border-color: rgba(115,72,72,.55); background: linear-gradient(135deg, #7a4848, #502e2e); color: #fce0e0; box-shadow: 0 8px 28px rgba(180,60,60,.16); }

/* ── IPOD PLAYER BAR ─────────────────────────────────────── */
.player-bar {
  display: none;
  flex-direction: column;
  background: rgba(22,24,26,0.98);
  border: 1px solid var(--band-border);
  border-radius: 20px;
  overflow: hidden;
  transition: border-color .5s, box-shadow .5s;
  box-shadow: 0 4px 24px rgba(0,0,0,.4), 0 0 0 0 var(--band-soft);
}
.player-bar.show { display: flex; }

/* Progress bar inside player */
.pb-progress { height: 2px; background: rgba(255,255,255,.08); position: relative; }
.pb-fill { height: 100%; background: var(--band-color); width: 0%; transition: width .4s linear, background .5s; }

/* Main player content */
.pb-main { display: flex; align-items: center; gap: 12px; padding: 10px 16px 12px; }

/* Song info */
.pb-info { flex: 1; min-width: 0; }
.pb-band { font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: var(--band-color); transition: color .5s; font-weight: 600; }
.pb-song { font-size: 14px; font-weight: 700; color: #eee; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pb-bpm  { font-size: 12px; color: #999; margin-top: 1px; }

/* Controls */
.pb-controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.pb-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.06);
  color: #ccc; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.pb-btn:hover { background: rgba(255,255,255,.14); color: #fff; }
.pb-btn:active { transform: scale(.9); }
.pb-btn:disabled { opacity: .25; pointer-events: none; }
.pb-btn.close-btn { border-color: rgba(255,255,255,.1); color: #888; }
.pb-btn.close-btn:hover { background: rgba(200,50,50,.15); border-color: rgba(200,50,50,.3); color: #d06060; }

/* Song number indicator */
.pb-pos { font-size: 13px; color: #999; font-weight: 600; text-align: center; white-space: nowrap; flex-shrink: 0; }

/* Prev/next song names below controls */
.pb-neighbors { display: flex; justify-content: space-between; padding: 0 16px 8px; gap: 8px; }
.pb-neighbor { font-size: 13px; font-weight: 500; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 46%; }
.pb-neighbor.right { text-align: right; }
.pb-neighbor.faded { opacity: 0; }

/* ── SETLIST PAGE ── */
.sec-head { display: flex; align-items: center; justify-content: space-between; }
.sec-head h2 { font-size: 20px; font-weight: 700; color: #d8d8d8; }
.sec-count { font-size: 13px; color: #888; }

.breadcrumb { display: flex; align-items: center; gap: 7px; font-size: 13px; color: #999; min-height: 22px; }
.bc-link { color: var(--accent); cursor: pointer; font-weight: 600; transition: color .2s; }
.bc-link:hover { color: #9ab8ff; }
.bc-sep { color: #777; }
.bc-cur { color: #ccc; font-weight: 600; }

.add-form { background: var(--card); border: 1px solid var(--card-border); border-radius: 20px; padding: 16px 18px; display: flex; flex-direction: column; gap: 11px; }
.form-label { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: #999; }
.form-row { display: flex; gap: 8px; align-items: center; }
.inp { flex: 1; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 11px 13px; color: #e0e0e0; font-size: 14px; outline: none; transition: border .2s, background .2s; font-family: inherit; }
.inp::placeholder { color: #666; }
.inp:focus { border-color: rgba(255,255,255,.28); background: rgba(255,255,255,.09); }
.inp-sm { width: 80px; flex: none; text-align: center; font-weight: 700; font-size: 16px; }
.add-btn { padding: 11px 16px; border-radius: 12px; border: 1px solid rgba(95,141,255,.32); background: rgba(95,141,255,.1); color: #90b3ff; font-size: 14px; font-weight: 700; cursor: pointer; transition: all .15s; white-space: nowrap; font-family: inherit; }
.add-btn:hover { background: rgba(95,141,255,.2); color: #b4ceff; }
.add-btn:active { transform: scale(.95); }

.dot-pick { display: flex; gap: 9px; align-items: center; flex-wrap: wrap; padding-top: 2px; }
.dot-opt { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all .15s; flex-shrink: 0; }
.dot-opt:hover { transform: scale(1.18); }
.dot-opt.sel { border-color: rgba(255,255,255,.85); transform: scale(1.15); }

.items-list { display: flex; flex-direction: column; gap: 8px; }

/* Band card */
.band-card {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 18px; padding: 14px 16px;
  display: flex; align-items: center; gap: 13px;
  cursor: pointer; transition: all .2s;
}
.band-card:hover { background: rgba(255,255,255,.09); border-color: rgba(255,255,255,.18); transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0,0,0,.3); }
.band-card:active { transform: translateY(0); }
.band-stripe { width: 4px; height: 36px; border-radius: 3px; flex-shrink: 0; }
.band-info { flex: 1; min-width: 0; }
.band-name { font-size: 15px; font-weight: 700; color: #ddd; }
.band-meta { font-size: 13px; color: #999; margin-top: 3px; }
.band-right { display: flex; align-items: center; gap: 8px; }
.band-arrow { color: #888; }

.icon-btn { width: 32px; height: 32px; border-radius: 9px; border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.05); color: #777; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; }
.icon-btn:hover { background: rgba(255,255,255,.14); color: #ccc; }
.icon-btn.del:hover { background: rgba(200,50,50,.15); border-color: rgba(200,50,50,.3); color: #d06060; }
.icon-btn:active { transform: scale(.88); }
.icon-btn:disabled { opacity: .2; pointer-events: none; }

/* Song card */
.song-card {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 15px; padding: 12px 14px;
  display: flex; align-items: center; gap: 11px;
  cursor: pointer; transition: all .18s;
}
.song-card:hover { background: rgba(255,255,255,.09); border-color: rgba(255,255,255,.17); }
.song-card.current { border-color: var(--band-border); background: var(--band-soft); box-shadow: 0 0 16px var(--band-soft); }
.song-num { font-size: 12px; color: #999; min-width: 20px; font-weight: 700; text-align: right; }
.song-card.current .song-num { color: var(--band-color); }
.song-info { flex: 1; min-width: 0; }
.song-name { font-size: 14px; font-weight: 600; color: #d4d4d4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-card.current .song-name { color: #fff; }
.song-note { font-size: 12px; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-bpm { font-size: 15px; font-weight: 700; color: var(--band-color); background: rgba(0,0,0,.2); border: 1px solid rgba(255,255,255,.08); border-radius: 9px; padding: 4px 10px; flex-shrink: 0; transition: color .5s; }
.song-actions { display: flex; gap: 4px; flex-shrink: 0; }

.bottom-actions { display: flex; gap: 7px; }
.action-btn { flex: 1; padding: 11px 6px; border-radius: 13px; border: 1px solid var(--card-border); background: rgba(255,255,255,.04); color: #ccc; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 5px; font-family: inherit; }
.action-btn:hover { background: rgba(255,255,255,.1); color: #ccc; }
.action-btn.primary { border-color: var(--band-border); background: var(--band-soft); color: var(--band-color); }
.action-btn.primary:hover { filter: brightness(1.2); }
.action-btn.danger:hover { background: rgba(200,50,50,.1); border-color: rgba(200,50,50,.25); color: #d06060; }

.empty-state { text-align: center; padding: 40px 16px; color: #999; font-size: 14px; line-height: 2; }

.footer-link { text-align: center; font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: #666; padding: 4px 8px 0; flex-shrink: 0; }
.footer-link a { color: #888; text-decoration: none; transition: color .2s; }
.footer-link a:hover { color: #ddd; }

/* ── EDIT MODAL ── */
.modal-backdrop {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.75); backdrop-filter: blur(6px);
  align-items: flex-end; justify-content: center;
}
.modal-backdrop.open { display: flex; }
.modal {
  width: 100%; max-width: 480px;
  background: #18191d; border: 1px solid rgba(255,255,255,.12);
  border-radius: 24px 24px 0 0; padding: 24px 20px;
  padding-bottom: calc(env(safe-area-inset-bottom,0px) + 24px);
  display: flex; flex-direction: column; gap: 14px;
}
.modal-title { font-size: 16px; font-weight: 700; color: #ddd; }
.modal-actions { display: flex; gap: 8px; margin-top: 4px; }
.modal-btn {
  flex: 1; padding: 13px; border-radius: 14px; font-size: 15px;

}
.modal-btn.cancel { border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.05); color: #999; }
.modal-btn.cancel:hover { background: rgba(255,255,255,.1); color: #ddd; }

.modal-btn.save:hover { background: rgba(95,141,255,.28); color: #c0d8ff; }

/* ── DRAG & DROP ── */
.drag-handle {
  color: #444; cursor: grab; padding: 4px 2px; display: flex;

}
.drag-handle:hover { color: #888; }

.song-card.drag-over { border-color: var(--band-color); background: var(--band-soft); }

/* ── VOICE COUNT TOGGLE ── */
.voice-row { display: flex; align-items: center; gap: 10px; }
.voice-toggle {
  display: flex; align-items: center; gap: 8px;

}
.voice-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

<script>
(function () {
  const ACCENTS     = ['#5f8dff','#f1b54f','#ff865c','#5dda9d'];
  const PLAY_SVG    = '<polygon points="5 3 19 12 5 21 5 3"/>';
  const PAUSE_SVG   = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  const BAND_COLORS = ['#5f8dff','#5dda9d','#f1b54f','#ff865c','#c084fc','#fb7185','#22d3ee','#f97316'];

  // ── AUDIO ──────────────────────────────────────────────────────────────────
  let bpm = 100, sub = 1, vol = 1.5, running = false;
  let audioCtx = null, masterGain = null;
  let nextT = 0, noteN = 0, timerId = null, ai = 0, bars = 0;

  // ── APP STATE ──────────────────────────────────────────────────────────────
  let bands        = [];
  let activeBandId = null;  // band being browsed in setlist tab
  let liveBandId   = null;  // band of song loaded in metronome
  let liveSongId   = null;  // song loaded in metronome
  let pickedColor  = BAND_COLORS[0];
  // Track position for progress fill animation
  let progTimer    = null;
  let progStart    = null;

  // ── DOM ────────────────────────────────────────────────────────────────────
  const root      = document.documentElement;
  const circle    = document.getElementById('circle');
  const hint      = document.getElementById('circleHint');
  const bpmDisp   = document.getElementById('bpmDisp');
  const bpmValEl  = document.getElementById('bpmVal');
  const bpmSlider = document.getElementById('bpmSlider');
  const volSlider = document.getElementById('volSlider');
  const volLbl    = document.getElementById('volLbl');
  const playBtn   = document.getElementById('playBtn');
  const playIco   = document.getElementById('playIco');
  const playLbl   = document.getElementById('playLbl');
  const w1        = document.getElementById('w1');
  const w2        = document.getElementById('w2');
  const playerBar = document.getElementById('playerBar');
  const pbBand    = document.getElementById('pbBand');
  const pbSong    = document.getElementById('pbSong');
  const pbBpm     = document.getElementById('pbBpm');
  const pbPos     = document.getElementById('pbPos');
  const pbFill    = document.getElementById('pbFill');
  const pbPrev    = document.getElementById('pbPrev');
  const pbNext    = document.getElementById('pbNext');
  const pbClose   = document.getElementById('pbClose');
  const pbPrevName= document.getElementById('pbPrevName');
  const pbNextName= document.getElementById('pbNextName');

  // ── AUDIO ENGINE ───────────────────────────────────────────────────────────
  function ensureAudio() {
    if (audioCtx && audioCtx.state !== 'closed') return true;
    try {
      const C = window.AudioContext || window.webkitAudioContext;
      audioCtx = new C();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = vol;
      // Compressor prevents clipping at high gain
      const comp = audioCtx.createDynamicsCompressor();
      comp.threshold.value = -6;
      comp.knee.value = 3;
      comp.ratio.value = 4;
      comp.attack.value = 0.001;
      comp.release.value = 0.1;
      masterGain.connect(comp);
      comp.connect(audioCtx.destination);
      return true;
    } catch(e) { return false; }
  }
  function tone(t, acc) {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(masterGain);
    o.frequency.value = acc ? 1200 : 800; g.gain.value = acc ? 0.28 : 0.14;
    o.start(t); o.stop(t + 0.05);
    setTimeout(doFlash, Math.max(0, (t - audioCtx.currentTime) * 1000));
  }
  function scheduler() {
    const spn = 60 / (bpm * sub);
    while (nextT < audioCtx.currentTime + 0.2) {
      const isQuarter = noteN % sub === 0;           // this note lands on a quarter beat
      const quarterNum = Math.floor(noteN / sub);    // which quarter (0-based, absolute)
      if (voiceOn && isQuarter) {
        // Quarter beat: play voice word (one/two/three/four)
        scheduleVoice(nextT, quarterNum % 4);
      } else if (voiceOn && !isQuarter) {
        // Subdivision beat: plain beep (unaccented), no voice
        tone(nextT, false);
      } else {
        // Normal mode: beep, accent on quarter beats
        tone(nextT, isQuarter);
      }
      if (isQuarter) {
        bars++;
        if (bars % 4 === 0) { ai = (ai+1) % ACCENTS.length; setMetAccent(ai); }
      }
      nextT += spn; noteN++;
    }
    timerId = setTimeout(scheduler, 100);
  }
  function startMet() { if (!ensureAudio()) return; if (audioCtx.state === 'suspended') audioCtx.resume(); noteN = 0; nextT = audioCtx.currentTime; scheduler(); }
  function stopMet()  { if (timerId) { clearTimeout(timerId); timerId = null; } }

  // ── VISUAL ─────────────────────────────────────────────────────────────────
  let flashT = null;
  // doFlash defined below (after stage mode, so it can flash both circles)

  function setMetAccent(i) {
    const c = ACCENTS[i];
    root.style.setProperty('--accent', c);
    const r=parseInt(c.slice(1,3),16), g=parseInt(c.slice(3,5),16), b=parseInt(c.slice(5,7),16);
    root.style.setProperty('--accent-soft', `rgba(${r},${g},${b},.22)`);
  }

  function setBandColor(hex) {
    hex = hex || '#5f8dff';
    root.style.setProperty('--band-color', hex);
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    root.style.setProperty('--band-soft',   `rgba(${r},${g},${b},.13)`);
    root.style.setProperty('--band-border',  `rgba(${r},${g},${b},.4)`);
  }

  function updateBPMDisplay(v) {
    bpm = Math.max(40, Math.min(240, v));
    bpmDisp.textContent = bpm;
    if (stageBpmNum) stageBpmNum.textContent = bpm;
    bpmValEl.textContent = bpm; bpmSlider.value = bpm;
    if (running) { stopMet(); startMet(); }
  }

  function volIcon() { const v = parseFloat(volSlider.value); w1.style.display = v>0.05?'':'none'; w2.style.display = v>1.0?'':'none'; volLbl.textContent = Math.round((v/3)*100)+'%'; }

  // ── TAP TEMPO ──────────────────────────────────────────────────────────────
  const tapCircle  = document.getElementById('tapCircle');
  const tapBpmEl   = document.getElementById('tapBpm');
  const tapHintEl  = document.getElementById('tapHint');
  let tapTimes     = [];
  let tapResetTid  = null;
  let tapFlashTid  = null;

  function doTap() {
    const now = Date.now();

    // Reset if more than 3s since last tap
    if (tapTimes.length > 0 && now - tapTimes[tapTimes.length - 1] > 3000) {
      tapTimes = [];
    }

    tapTimes.push(now);

    // Keep last 8 taps for average
    if (tapTimes.length > 8) tapTimes = tapTimes.slice(-8);

    // Need at least 2 taps to calculate
    if (tapTimes.length >= 2) {
      const intervals = [];
      for (let i = 1; i < tapTimes.length; i++) {
        intervals.push(tapTimes[i] - tapTimes[i-1]);
      }
      const avg = intervals.reduce((a,b) => a+b, 0) / intervals.length;
      const detected = Math.round(60000 / avg);
      const clamped  = Math.max(40, Math.min(240, detected));

      tapBpmEl.textContent = clamped;
      tapHintEl.textContent = 'carica →';

      // Load into metronome on tap if ≥ 2 readings
      updateBPMDisplay(clamped);
    } else {
      tapBpmEl.textContent = '';
      tapHintEl.textContent = '...';
    }

    // Flash
    tapCircle.classList.add('tap-flash');
    if (tapFlashTid) clearTimeout(tapFlashTid);
    tapFlashTid = setTimeout(() => tapCircle.classList.remove('tap-flash'), 150);

    // Auto-reset after 3s of inactivity
    if (tapResetTid) clearTimeout(tapResetTid);
    tapResetTid = setTimeout(() => {
      tapTimes = [];
      tapBpmEl.textContent = '';
      tapHintEl.textContent = 'tempo';
    }, 3000);
  }

  tapCircle.addEventListener('click', doTap);
  // Also support touch for faster response on mobile
  tapCircle.addEventListener('touchstart', e => { e.preventDefault(); doTap(); }, { passive: false });

  // ── PLAY/STOP ──────────────────────────────────────────────────────────────
  function toggle() {
    running = !running;
    if (running) {
      ai = 0; bars = 0; setMetAccent(0); startMet();
      playBtn.classList.add('on'); playIco.innerHTML = PAUSE_SVG; playLbl.textContent = 'PAUSA';
      circle.classList.add('on'); hint.textContent = 'tap to stop';
    } else {
      stopMet();
      playBtn.classList.remove('on'); playIco.innerHTML = PLAY_SVG; playLbl.textContent = 'START';
      circle.classList.remove('on'); hint.textContent = 'tap to start';
    }
  }

  // ── DATA ───────────────────────────────────────────────────────────────────
  function save() { localStorage.setItem('pc_v4', JSON.stringify({ bands, liveBandId, liveSongId })); }
  function load() {
    try { const d = JSON.parse(localStorage.getItem('pc_v4') || '{}'); bands = d.bands || []; liveBandId = d.liveBandId || null; liveSongId = d.liveSongId || null; } catch { bands = []; }
  }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function getBand(id) { return bands.find(b => b.id === id); }
  function getLiveBand() { return getBand(liveBandId); }
  function getLiveSong() { const b = getLiveBand(); return b ? b.songs.find(s => s.id === liveSongId) || null : null; }
  function getLiveIdx()  { const b = getLiveBand(); return b ? b.songs.findIndex(s => s.id === liveSongId) : -1; }

  // ── PLAYER BAR ─────────────────────────────────────────────────────────────
  function updatePlayerBar() {
    const band = getLiveBand();
    const song = getLiveSong();
    if (!band || !song) {
      playerBar.classList.remove('show');
      setBandColor(null);
      return;
    }

    playerBar.classList.add('show');
    setBandColor(band.color);

    pbBand.textContent = band.name;
    pbSong.textContent = song.name;
    pbBpm.textContent  = song.bpm + ' BPM' + (song.note ? ' · ' + song.note : '');

    const idx  = getLiveIdx();
    const total = band.songs.length;
    pbPos.textContent = (idx+1) + '/' + total;

    // Progress fill: fraction through setlist
    pbFill.style.width = total > 1 ? ((idx / (total-1)) * 100) + '%' : '100%';

    const prev = idx > 0           ? band.songs[idx-1] : null;
    const next = idx < total-1     ? band.songs[idx+1] : null;

    pbPrev.disabled = !prev;
    pbNext.disabled = !next;
    pbPrevName.textContent = prev ? '← ' + prev.name : '';
    pbNextName.textContent = next ? next.name + ' →' : '';
  }

  // ── SELECT / LOAD SONG ─────────────────────────────────────────────────────
  function selectSong(bandId, songId) {
    const band = getBand(bandId);
    const song = band && band.songs.find(s => s.id === songId);
    if (!song) return;
    liveBandId = bandId; liveSongId = songId;
    // Update BPM without clearing live state
    updateBPMDisplay(song.bpm);
    save(); renderSongs(); updatePlayerBar();
    showPage('met');
  }

  function loadSetlist(bandId) {
    const band = getBand(bandId);
    if (!band || !band.songs.length) return;
    selectSong(bandId, band.songs[0].id);
  }

  function exitSetlist() {
    liveBandId = null; liveSongId = null;
    save(); updatePlayerBar();
    if (activeBandId) renderSongs();
  }

  function navRelative(dir) {
    const idx = getLiveIdx();
    const band = getLiveBand();
    if (!band || idx < 0) return;
    const next = band.songs[idx + dir];
    if (next) {
      selectSong(liveBandId, next.id);
      }
  }

  // ── NAVIGATION ─────────────────────────────────────────────────────────────
  function navBands() {
    document.getElementById('viewBands').style.display = 'flex';
    document.getElementById('viewSongs').style.display = 'none';
    renderBands();
  }
  function navSongs(bandId) {
    activeBandId = bandId;
    document.getElementById('viewBands').style.display = 'none';
    document.getElementById('viewSongs').style.display = 'flex';
    setBandColor(getBand(bandId)?.color);
    renderSongs();
  }

  // ── RENDER BANDS ───────────────────────────────────────────────────────────
  function renderBands() {
    const el = document.getElementById('bandList');
    const ct = document.getElementById('bandCount');
    ct.textContent = bands.length + (bands.length === 1 ? ' band' : ' band');
    if (!bands.length) {
      el.innerHTML = `<div class="empty-state">Nessuna band ancora.<br>Creane una qui sopra!</div>`;
      return;
    }
    el.innerHTML = bands.map(b => {
      const n = b.songs.length;
      return `<div class="band-card" data-id="${b.id}">
        <div class="band-stripe" style="background:${esc(b.color)};box-shadow:0 0 8px ${esc(b.color)}88"></div>
        <div class="band-info">
          <div class="band-name">${esc(b.name)}</div>
          <div class="band-meta">${n} ${n===1?'brano':'brani'}</div>
        </div>
        <div class="band-right">
          <div class="band-arrow"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div>
          <button class="icon-btn del" data-del="${b.id}">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>`;
    }).join('');

    el.querySelectorAll('.band-card').forEach(card => {
      card.addEventListener('click', e => { if (e.target.closest('[data-del]')) return; navSongs(card.dataset.id); });
    });
    el.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const b = getBand(btn.dataset.del);
        if (!b) return;
        if (b.songs.length > 0 && !confirm(`Eliminare "${b.name}" e tutti i suoi brani?`)) return;
        bands = bands.filter(x => x.id !== b.id);
        if (liveBandId === b.id) { liveBandId = liveSongId = null; updatePlayerBar(); }
        save(); renderBands();
      });
    });
  }

  // ── RENDER SONGS ───────────────────────────────────────────────────────────
  function renderSongs() {
    const band = getBand(activeBandId);
    if (!band) { navBands(); return; }

    setBandColor(band.color);
    document.getElementById('bcBandName').textContent   = band.name;
    document.getElementById('songPageTitle').textContent = band.name;

    const el = document.getElementById('songList');
    const ct = document.getElementById('songCount');
    const sa = document.getElementById('songActions');
    const n  = band.songs.length;
    ct.textContent = n + (n===1?' brano':' brani');
    sa.style.display = n > 0 ? 'flex' : 'none';

    if (!n) {
      el.innerHTML = `<div class="empty-state">Nessun brano ancora.<br>Aggiungili qui sopra<br>e carica la setlist con un tap.</div>`;
      return;
    }

    el.innerHTML = band.songs.map((song, i) => {
      const isCur = liveBandId === activeBandId && liveSongId === song.id;
      return `<div class="song-card ${isCur?'current':''}" data-id="${song.id}" draggable="true">
        <div class="drag-handle" data-drag="${song.id}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="8" y1="18" x2="16" y2="18"/></svg>
        </div>
        <div class="song-num">${i+1}</div>
        <div class="song-info">
          <div class="song-name">${esc(song.name)}</div>
          ${song.note ? `<div class="song-note">${esc(song.note)}</div>` : ''}
        </div>
        <div class="song-bpm">${song.bpm}</div>
        <div class="song-actions">
          <button class="icon-btn" data-edit="${song.id}" title="Modifica"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
          <button class="icon-btn del" data-del="${song.id}"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
      </div>`;
    }).join('');

    el.querySelectorAll('.song-card').forEach(card => {
      card.addEventListener('click', e => { if (e.target.closest('.song-actions') || e.target.closest('.drag-handle')) return; selectSong(activeBandId, card.dataset.id); });
    });
    el.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', e => { e.stopPropagation(); openEditModal(activeBandId, btn.dataset.edit); });
    });
    el.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', e => { e.stopPropagation(); deleteSong(band, btn.dataset.del); });
    });
    initDragDrop(el, band);
  }

  function moveSong(band, id, dir) {
    const i = band.songs.findIndex(s => s.id === id), j = i + dir;
    if (j < 0 || j >= band.songs.length) return;
    [band.songs[i], band.songs[j]] = [band.songs[j], band.songs[i]];
    save(); renderSongs(); updatePlayerBar();
  }
  function deleteSong(band, id) {
    band.songs = band.songs.filter(s => s.id !== id);
    if (liveSongId === id) { liveSongId = null; updatePlayerBar(); }
    save(); renderSongs();
  }

  // ── COLOR PICKER ───────────────────────────────────────────────────────────
  function renderDotPick() {
    const el = document.getElementById('dotPick');
    el.innerHTML = BAND_COLORS.map(c =>
      `<div class="dot-opt${c===pickedColor?' sel':''}" data-c="${c}" style="background:${c};box-shadow:0 0 8px ${c}99"></div>`
    ).join('');
    el.querySelectorAll('.dot-opt').forEach(d => {
      d.addEventListener('click', () => { pickedColor = d.dataset.c; renderDotPick(); });
    });
  }

  // ── ADD ACTIONS ────────────────────────────────────────────────────────────
  function addBand() {
    const name = document.getElementById('inpBandName').value.trim();
    if (!name) { document.getElementById('inpBandName').focus(); return; }
    bands.push({ id: uid(), name, color: pickedColor, songs: [] });
    document.getElementById('inpBandName').value = '';
    pickedColor = BAND_COLORS[bands.length % BAND_COLORS.length];
    renderDotPick();
    save(); renderBands();
  }

  function addSong() {
    const band = getBand(activeBandId); if (!band) return;
    const name = document.getElementById('inpSongName').value.trim();
    const bpmV = parseInt(document.getElementById('inpSongBpm').value);
    const note = document.getElementById('inpSongNote').value.trim();
    if (!name) { document.getElementById('inpSongName').focus(); return; }
    if (!bpmV || bpmV < 40 || bpmV > 240) { document.getElementById('inpSongBpm').focus(); return; }
    band.songs.push({ id: uid(), name, bpm: bpmV, note });
    document.getElementById('inpSongName').value  = '';
    document.getElementById('inpSongBpm').value   = '';
    document.getElementById('inpSongNote').value  = '';
    save(); renderSongs();
    document.getElementById('inpSongName').focus();
  }

  function exportSongs() {
    const band = getBand(activeBandId); if (!band) return;
    const lines = band.songs.map((s,i) => `${i+1}. ${s.name} — ${s.bpm} BPM${s.note?' ('+s.note+')':''}`);
    const text  = `POCKET CLICK\n${band.name}\n${'─'.repeat(30)}\n${lines.join('\n')}`;
    const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(new Blob([text],{type:'text/plain'})), download: band.name+'.txt' });
    a.click();
  }

  // ── DRAG & DROP ────────────────────────────────────────────────────────────
  function initDragDrop(container, band) {
    let dragId = null;

    container.querySelectorAll('.song-card').forEach(card => {
      card.addEventListener('dragstart', e => {
        dragId = card.dataset.id;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        container.querySelectorAll('.song-card').forEach(c => c.classList.remove('drag-over'));
      });
      card.addEventListener('dragover', e => {
        e.preventDefault(); e.dataTransfer.dropEffect = 'move';
        container.querySelectorAll('.song-card').forEach(c => c.classList.remove('drag-over'));
        if (card.dataset.id !== dragId) card.classList.add('drag-over');
      });
      card.addEventListener('drop', e => {
        e.preventDefault();
        const fromId = dragId;
        const toId   = card.dataset.id;
        if (!fromId || fromId === toId) return;
        const fi = band.songs.findIndex(s => s.id === fromId);
        const ti = band.songs.findIndex(s => s.id === toId);
        if (fi < 0 || ti < 0) return;
        const [moved] = band.songs.splice(fi, 1);
        band.songs.splice(ti, 0, moved);
        save(); renderSongs(); updatePlayerBar();
      });
    });

    // Touch drag-drop (mobile)
    let touchDragId = null, touchClone = null, touchOffY = 0;
    container.querySelectorAll('.drag-handle').forEach(handle => {
      handle.addEventListener('touchstart', e => {
        const card = handle.closest('.song-card');
        touchDragId = card.dataset.id;
        const rect = card.getBoundingClientRect();
        touchOffY = e.touches[0].clientY - rect.top;
        touchClone = card.cloneNode(true);
        touchClone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:.85;z-index:999;pointer-events:none;border-radius:15px;`;
        document.body.appendChild(touchClone);
        card.classList.add('dragging');
        e.preventDefault();
      }, { passive: false });

      handle.addEventListener('touchmove', e => {
        if (!touchClone) return;
        const y = e.touches[0].clientY - touchOffY;
        touchClone.style.top = y + 'px';
        // Highlight drop target
        const elBelow = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
        container.querySelectorAll('.song-card').forEach(c => c.classList.remove('drag-over'));
        const target = elBelow && elBelow.closest('.song-card');
        if (target && target.dataset.id !== touchDragId) target.classList.add('drag-over');
        e.preventDefault();
      }, { passive: false });

      handle.addEventListener('touchend', e => {
        if (!touchClone) return;
        const touch = e.changedTouches[0];
        const elBelow = document.elementFromPoint(touch.clientX, touch.clientY);
        const target  = elBelow && elBelow.closest('.song-card');
        touchClone.remove(); touchClone = null;
        container.querySelectorAll('.song-card').forEach(c => { c.classList.remove('dragging'); c.classList.remove('drag-over'); });
        if (!target || target.dataset.id === touchDragId) return;
        const fi = band.songs.findIndex(s => s.id === touchDragId);
        const ti = band.songs.findIndex(s => s.id === target.dataset.id);
        if (fi < 0 || ti < 0) return;
        const [moved] = band.songs.splice(fi, 1);
        band.songs.splice(ti, 0, moved);
        save(); renderSongs(); updatePlayerBar();
      }, { passive: false });
    });
  }

  // ── EDIT SONG MODAL ────────────────────────────────────────────────────────
  let editingBandId = null, editingSongId = null;

  function openEditModal(bandId, songId) {
    const band = getBand(bandId);
    const song = band && band.songs.find(s => s.id === songId);
    if (!song) return;
    editingBandId = bandId; editingSongId = songId;
    document.getElementById('editName').value = song.name;
    document.getElementById('editBpm').value  = song.bpm;
    document.getElementById('editNote').value = song.note || '';
    document.getElementById('editModal').classList.add('open');
    document.getElementById('editName').focus();
  }

  function closeEditModal() {
    document.getElementById('editModal').classList.remove('open');
    editingBandId = null; editingSongId = null;
  }

  function saveEdit() {
    const band = getBand(editingBandId);
    const song = band && band.songs.find(s => s.id === editingSongId);
    if (!song) { closeEditModal(); return; }
    const name = document.getElementById('editName').value.trim();
    const bpmV = parseInt(document.getElementById('editBpm').value);
    const note = document.getElementById('editNote').value.trim();
    if (!name || !bpmV || bpmV < 40 || bpmV > 240) return;
    song.name = name; song.bpm = bpmV; song.note = note;
    // If this is the live song, update metronome BPM too
    if (liveSongId === editingSongId) updateBPMDisplay(bpmV);
    save(); renderSongs(); updatePlayerBar(); updateStageUI();
    closeEditModal();
  }

  document.getElementById('editCancel').addEventListener('click', closeEditModal);
  document.getElementById('editSave').addEventListener('click', saveEdit);
  document.getElementById('editModal').addEventListener('click', e => { if (e.target === document.getElementById('editModal')) closeEditModal(); });
  document.getElementById('editName').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('editBpm').focus(); });
  document.getElementById('editBpm').addEventListener('keydown',  e => { if(e.key==='Enter') document.getElementById('editNote').focus(); });
  document.getElementById('editNote').addEventListener('keydown', e => { if(e.key==='Enter') saveEdit(); });

  // ── BACKUP / RESTORE ───────────────────────────────────────────────────────
  function exportData() {
    const payload = { version: 1, exported: new Date().toISOString(), bands };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(blob),
      download: 'pocketclick-backup.json'
    });
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function importData(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const d = JSON.parse(e.target.result);
        if (!Array.isArray(d.bands)) throw new Error('Formato non valido');
        if (!confirm('Importare ' + d.bands.length + ' band? I dati attuali verranno sostituiti.')) return;
        bands = d.bands;
        liveBandId = null; liveSongId = null;
        save(); renderBands(); updatePlayerBar();
        alert('Importazione completata!');
      } catch(err) {
        alert('Errore: file non valido o corrotto.');
      }
    };
    reader.readAsText(file);
  }

    document.getElementById('pageSet').classList.toggle('visible', which==='set');
    document.getElementById('tabMet').classList.toggle('active', which==='met');
    document.getElementById('tabSet').classList.toggle('active', which==='set');
    if (which === 'set') navBands();
  }

  // ── STAGE MODE ────────────────────────────────────────────────────────────
  const stageOverlay    = document.getElementById('stageOverlay');
  const stageBigCircle  = document.getElementById('stageBigCircle');
  const stageBpmNum     = document.getElementById('stageBpmNum');
  const stageSongName   = document.getElementById('stageSongName');
  const stageBandName   = document.getElementById('stageBandName');
  const stageSongBpm    = document.getElementById('stageSongBpm');
  const stageNav        = document.getElementById('stageNav');
  const stagePrev       = document.getElementById('stagePrev');
  const stageNext       = document.getElementById('stageNext');
  const stageNeighborPrev = document.getElementById('stageNeighborPrev');
  const stageNeighborNext = document.getElementById('stageNeighborNext');
  const stageCounter = document.getElementById('stageCounter');
  let stageOpen = false;

  function updateStageUI() {
    stageBpmNum.textContent = bpm;
    const band = getLiveBand();
    const song = getLiveSong();
    if (band && song) {
      stageNav.style.display = 'flex';
      stageSongName.textContent = song.name;
      stageBandName.textContent = band.name;
      stageSongBpm.textContent  = song.bpm + ' BPM';
      const idx   = getLiveIdx();
      const total = band.songs.length;
      const prev  = idx > 0       ? band.songs[idx-1] : null;
      const next  = idx < total-1 ? band.songs[idx+1] : null;
      stagePrev.disabled = !prev;
      stageNext.disabled = !next;
      stageNeighborPrev.textContent = prev ? '← ' + prev.name : '';
      stageCounter.textContent      = (idx+1) + ' / ' + total;
      stageNeighborNext.textContent = next ? next.name + ' →' : '';
    } else {
      stageNav.style.display = 'none';
      stageNeighborPrev.textContent = '';
      stageCounter.textContent      = '';
      stageNeighborNext.textContent = '';
    }
  }

  function openStage() {
    stageOpen = true;
    stageOverlay.classList.add('active');
    updateStageUI();
    // Keep screen on if supported
    if (navigator.wakeLock) navigator.wakeLock.request('screen').catch(()=>{});
  }
  function closeStage() {
    stageOpen = false;
    stageOverlay.classList.remove('active');
  }

  // Stage circle flash (mirrors main circle)
  function stageFlash() {
    stageBigCircle.classList.add('flash');
    setTimeout(() => stageBigCircle.classList.remove('flash'), 110);
  }

  // Hook into existing doFlash to also flash stage circle when open
  const _origDoFlash = doFlash;

  document.getElementById('stageCircleBtn').addEventListener('click', openStage);
  document.getElementById('stageCircleBtn').addEventListener('touchstart', e => { e.preventDefault(); openStage(); }, { passive: false });
  document.getElementById('stageExit').addEventListener('click', closeStage);

  stagePrev.addEventListener('click', () => { navRelative(-1); updateStageUI(); });
  stageNext.addEventListener('click', () => { navRelative(+1); updateStageUI(); });

  // Swipe support on stage overlay
  let swipeStartX = null;
  stageOverlay.addEventListener('touchstart', e => {
    if (e.target.closest('.stage-nav-btn') || e.target.closest('.stage-exit')) return;
    swipeStartX = e.touches[0].clientX;
  }, { passive: true });
  stageOverlay.addEventListener('touchend', e => {
    if (swipeStartX === null) return;
    const dx = e.changedTouches[0].clientX - swipeStartX;
    swipeStartX = null;
    if (Math.abs(dx) < 50) return; // not a swipe
    if (dx < 0) { // swipe left → next
      if (!stageNext.disabled) { navRelative(+1); updateStageUI(); }
    } else { // swipe right → prev
      if (!stagePrev.disabled) { navRelative(-1); updateStageUI(); }
    }
  }, { passive: true });

  // Tap big circle = toggle metronome
  stageBigCircle.addEventListener('click', toggle);
  stageBigCircle.addEventListener('touchstart', e => { e.preventDefault(); toggle(); }, { passive: false });

  // Escape key closes stage
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && stageOpen) closeStage();
  });

  // Patch doFlash to also flash stage circle
  function doFlash() {
    circle.classList.add('flash');
    if (flashT) clearTimeout(flashT);
    flashT = setTimeout(() => circle.classList.remove('flash'), 110);
    if (stageOpen) stageFlash();
    if (stageOpen && stageBpmNum) stageBpmNum.textContent = bpm;
  }

  async function decodeVoiceB64(b64, ctx) {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return ctx.decodeAudioData(bytes.buffer);
  }

  async function buildAllVoiceBuffers() {
    if (voiceReady) return;
    if (!audioCtx) return;
    voiceLblEl.textContent = 'loading…';
    try {
      const decoded = await Promise.all(VOICE_B64.map(b64 => decodeVoiceB64(b64, audioCtx)));
      decoded.forEach((buf, i) => { voiceBuffers[i] = buf; });
      voiceReady = true;
      voiceLblEl.textContent = voiceOn ? 'voice on' : '1-2-3-4';
    } catch(e) {
      console.error('Voice decode error:', e);
      voiceLblEl.textContent = 'voice err';
    }
  }

  // How many seconds before the beat each word should start,
  // so the stressed vowel lands exactly on the beat.
  // Measured from the actual MP3 files (consonant pre-roll).
  const VOICE_OFFSET = [0, 0, 0, 0]; // one, two, three, four — 10ms pad in file

  function scheduleVoice(t, beatIdx) {
    if (!audioCtx) return;
    // Flash always on the beat, regardless of voice pre-roll
    setTimeout(doFlash, Math.max(0, (t - audioCtx.currentTime) * 1000));

    const buf = voiceBuffers[beatIdx];
    if (buf) {
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      // playbackRate = 1.0 always: no pitch shift, no time-stretching
      src.playbackRate.value = 1.0;
      const g = audioCtx.createGain();
      g.gain.value = beatIdx === 0 ? 1.0 : 0.82;
      src.connect(g);
      g.connect(masterGain);
      // Start the audio slightly before the beat so the vowel hits on time
      const startT = Math.max(audioCtx.currentTime + 0.001, t - VOICE_OFFSET[beatIdx]);
      src.start(startT);
      src.stop(startT + buf.duration + 0.05);
    } else {
      // Fallback beeps
      const freqs = [880, 740, 660, 590];
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(masterGain);
      o.frequency.value = freqs[beatIdx];
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.3, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      o.start(t); o.stop(t + 0.13);
    }
  }

  voiceToggleBtn.addEventListener('click', () => {
    voiceOn = !voiceOn;
    voiceToggleBtn.classList.toggle('on', voiceOn);
    voiceLblEl.textContent = voiceOn ? 'voice on' : '1-2-3-4';
    if (voiceOn && !voiceReady) {
      if (!audioCtx) ensureAudio();
      buildAllVoiceBuffers();
    }
  });

  // ── PWA ────────────────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

  // ── INIT ───────────────────────────────────────────────────────────────────
  load();
  volIcon();
  renderDotPick();
  updatePlayerBar();
  if (liveSongId) { const s = getLiveSong(); if (s) updateBPMDisplay(s.bpm); }

})();
